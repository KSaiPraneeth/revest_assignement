services:
  postgres:
    image: postgres:16-alpine
    container_name: revest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-revest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revest_secret}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-revest}']
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    container_name: revest-product-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-revest}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-revest_secret}
      DB_NAME: product_db
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile
    container_name: revest-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      product-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-revest}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-revest_secret}
      DB_NAME: order_db
      DB_SYNCHRONIZE: 'false'
      DB_LOGGING: 'false'
      PRODUCT_SERVICE_URL: http://product-service:3001
    ports:
      - '3003:3003'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
