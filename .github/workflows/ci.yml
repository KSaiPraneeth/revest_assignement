name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: revest
          POSTGRES_PASSWORD: revest_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/auth-service/package-lock.json
            backend/product-service/package-lock.json
            backend/order-service/package-lock.json

      - name: Init databases
        run: |
          PGPASSWORD=revest_secret psql -h localhost -U revest -d postgres -c "CREATE DATABASE auth_db;"
          PGPASSWORD=revest_secret psql -h localhost -U revest -d postgres -c "CREATE DATABASE product_db;"
          PGPASSWORD=revest_secret psql -h localhost -U revest -d postgres -c "CREATE DATABASE order_db;"

      - name: Install & test Auth Service
        working-directory: backend/auth-service
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: revest
          DB_PASSWORD: revest_secret
          DB_NAME: auth_db
          DB_SYNCHRONIZE: 'true'
          JWT_SECRET: test_jwt_secret
        run: |
          npm ci
          npm test
          npm run build

      - name: Install & test Product Service
        working-directory: backend/product-service
        run: |
          npm ci
          npm run migration:run
          npm test
          npm run build

      - name: Install & test Order Service
        working-directory: backend/order-service
        run: |
          npm ci
          npm run migration:run
          npm test
          npm run build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install, test & build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
